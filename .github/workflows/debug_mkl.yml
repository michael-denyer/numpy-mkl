name: Debug MKL DLLs

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: windows-2022
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
        with:
          python-version: "3.13"
          version-file: "pyproject.toml"
          enable-cache: false

      - name: Install mkl-devel and list DLLs
        run: |
          MKL_DIR=$(realpath ../../mkl)
          uv venv "$MKL_DIR"
          source "$MKL_DIR/Scripts/activate"
          uv pip install mkl-devel

          echo "=== MKL packages installed ==="
          uv pip list | grep -i mkl

          echo ""
          echo "=== Find ALL mkl DLLs ==="
          find "$MKL_DIR" -name "mkl_*.dll" 2>/dev/null || echo "No mkl_*.dll found"

          echo ""
          echo "=== Find mkl_intel_thread specifically ==="
          find "$MKL_DIR" -name "mkl_intel_thread*" 2>/dev/null || echo "Not found"

          echo ""
          echo "=== Find mkl_rt specifically ==="
          find "$MKL_DIR" -name "mkl_rt*" 2>/dev/null || echo "Not found"

          echo ""
          echo "=== Library/bin contents ==="
          ls -la "$MKL_DIR/Library/bin/" 2>/dev/null || echo "Library/bin does not exist"

          echo ""
          echo "=== Lib contents ==="
          ls -la "$MKL_DIR/Library/lib/"mkl_* 2>/dev/null || echo "No mkl files in Library/lib"

          echo ""
          echo "=== All .dll files anywhere in MKL_DIR ==="
          find "$MKL_DIR" -name "*.dll" 2>/dev/null | head -30 || echo "No DLLs found"

          echo ""
          echo "=== pip show mkl (files) ==="
          uv pip show -f mkl 2>/dev/null | head -30

          echo ""
          echo "=== Try installing mkl (runtime) separately ==="
          uv pip install mkl
          echo ""
          echo "=== After mkl install: find mkl_intel_thread ==="
          find "$MKL_DIR" -name "mkl_intel_thread*" 2>/dev/null || echo "Still not found"
          echo ""
          echo "=== After mkl install: all DLLs ==="
          find "$MKL_DIR" -name "*.dll" 2>/dev/null | head -30
